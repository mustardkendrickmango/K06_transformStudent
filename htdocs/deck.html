
<!DOCTYPE html>
<html>
	<head>
		<title>Transition and Animation Exercises</title>
		<meta charset="UTF-8">
		<meta name="description" content="Sample Code to implement transform and transition">
	    <meta name="author" content="A.L. Mendoza & M.Tarcelo">
	    <meta name="revised" content="12/04/2022">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<style>
			* {
				box-sizing: border-box;
			}
			#deck{
				width: 50vw;
				height: 50vh;
				margin: 0 auto 110px;
				border: 3px solid black;
				padding: 40px;
				margin-top:230px;	
				
				
			}
			#deck div{
				border: 3px solid black;
				height: 25vh;
				width: 40vh;
				background-color: white;
				color: red;
				font-size: 2em;
				padding: 5px;
				font-weight: bold;
				position: absolute;
				margin-left: 250px;
				margin-top: 50px;
				transition-duration: 1s;
				
			}
			#deck div:hover{
				border: 3px solid yellow;
			}
			#deck:hover div:first-child{
				background-color: rgb(85, 0, 0);
				z-index: 1;
				transform: rotate(-60deg);
  				transform-origin: 0% 100%;
				  
			}
			#deck:hover div:nth-child(2){
				background-color: rgb(212, 0, 255);
				z-index: 2;
				transform: rotate(-40deg);
  				transform-origin: 0% 100%;
			}
			#deck:hover div:nth-child(3){
				background-color: rgb(6, 4, 158);
				z-index: 3;
				transform: rotate(-20deg);
  				transform-origin: 0% 100%;
			}
			#deck:hover div:nth-child(4){
				background-color: rgb(233, 97, 7);
				z-index: 4;
				transform: rotate(0deg);
  				transform-origin: 0% 100%;
			}
			#deck:hover div:nth-child(5){
				background-color: violet;
				z-index: 5;
				transform: rotate(20deg);
  				transform-origin: 0% 100%;
				
			}
			a {
				text-decoration: none;
			}
			button {
				display: block;
				width: 25vw;
				padding: 5px;
				margin: 10px auto;
			}
		</style>
	</head>
	<body>
		<div id="deck">
			<div> &#128742;</div>
			<div> &#128060;</div>
			<div> &#127769;</div>
			<div> &#127875;</div>
      		<div> &#127183;</div>
		</div>
    <a href="../index.html"><button> Click me for Home</button> </a>
	</body>
</html>
